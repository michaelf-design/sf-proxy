<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SF Translation Tester v4 — Retrieve + Structure Discovery</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Mono',monospace;background:#0a0a0f;color:#e8e8f0;font-size:12px;padding:20px;}
h1{font-size:15px;color:#6c63ff;margin-bottom:12px;}
.panel{background:#12121a;border:1px solid #2a2a40;border-radius:8px;padding:14px;margin-bottom:12px;}
label{font-size:10px;color:#8888aa;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px;margin-top:8px;}
input{background:#0a0a0f;border:1px solid #3a3a55;border-radius:6px;color:#e8e8f0;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 8px;width:100%;}
input:focus{outline:none;border-color:#6c63ff;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn{padding:8px 16px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;border:1px solid;margin-right:8px;margin-top:8px;}
.ba{background:#6c63ff;border-color:#6c63ff;color:#fff;}.ba:hover{filter:brightness(1.15);}
.bg{background:transparent;border-color:#3a3a55;color:#8888aa;}.bg:hover{border-color:#6c63ff;color:#e8e8f0;}
.btn:disabled{opacity:0.35;cursor:not-allowed;}
#log{background:#0a0a0f;border:1px solid #2a2a40;border-radius:6px;padding:12px;max-height:700px;overflow-y:auto;font-size:11px;line-height:1.9;margin-top:12px;white-space:pre-wrap;}
.ok{color:#00d4aa;display:block;}.err{color:#ff6b6b;display:block;}.warn{color:#f5c842;display:block;}.info{color:#8888aa;display:block;}.trans{color:#6c63ff;display:block;}
</style>
</head>
<body>
<h1>⚡ SF Translation Tester v4 — Retrieve file + try all element variations</h1>
<div class="panel">
  <div class="g2">
    <div><label>Proxy</label><input id="proxy" value="https://sf-proxy-ncj5.onrender.com"/></div>
    <div><label>Instance</label><input id="inst" value="https://orgfarm-f9bef0820c-dev-ed.develop.my.salesforce.com"/></div>
  </div>
  <label>Access Token (main app → Console F12 → S.token)</label>
  <input type="password" id="tok" placeholder="00DgK..."/>
  <div class="g2">
    <div><label>Object</label><input id="obj" value="Account"/></div>
    <div><label>Field (with __c)</label><input id="fld" value="sadsad1231231__c"/></div>
  </div>
  <label>Hebrew Label</label>
  <input id="heb" value="שדגשדגשדג" dir="rtl"/>
  <div>
    <button class="btn ba" id="btn" onclick="runAll()">▶ Run all tests</button>
    <button class="btn bg" onclick="document.getElementById('log').innerHTML=''">Clear</button>
  </div>
</div>
<div id="log">Click Run to start...</div>
<script>
function ts(){const n=new Date();return`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;}
function log(msg,cls='info'){const b=document.getElementById('log');const s=document.createElement('span');s.className=cls;s.textContent=`${ts()} ${msg}`;b.appendChild(s);b.scrollTop=b.scrollHeight;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function vals(){return{proxy:document.getElementById('proxy').value.trim().replace(/\/$/,''),inst:document.getElementById('inst').value.trim().replace(/\/$/,''),tok:document.getElementById('tok').value.trim(),obj:document.getElementById('obj').value.trim(),fld:document.getElementById('fld').value.trim(),heb:document.getElementById('heb').value.trim()};}
async function soap(proxy,inst,tok,body){const r=await fetch(proxy+'/metadata-deploy',{method:'POST',headers:{'Content-Type':'text/xml','x-sf-instance':inst,'x-sf-token':tok},body});return{status:r.status,text:await r.text()};}

async function runAll(){
  document.getElementById('log').innerHTML='';
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Running...';
  const{proxy,inst,tok,obj,fld,heb}=vals();
  const dev=fld.replace(/__c$/i,'');
  if(!tok){log('Paste token first','err');btn.disabled=false;btn.textContent='▶ Run all tests';return;}
  log(`Object: ${obj} | Dev: ${dev} | Hebrew: ${heb}`,'info');
  log('─────────────────────────────────────────','info');

  // STEP 1: Retrieve the actual he.translation-meta.xml file via async retrieve
  log('STEP 1 — retrieve(he) to get actual file structure from org','trans');
  const retrieveSOAP=`<?xml version="1.0" encoding="UTF-8"?>
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:met="http://soap.sforce.com/2006/04/metadata">
  <soapenv:Header><met:SessionHeader><met:sessionId>${tok}</met:sessionId></met:SessionHeader></soapenv:Header>
  <soapenv:Body>
    <met:retrieve>
      <met:retrieveRequest>
        <met:apiVersion>59.0</met:apiVersion>
        <met:unpackaged>
          <met:types>
            <met:members>he</met:members>
            <met:name>Translations</met:name>
          </met:types>
          <met:version>59.0</met:version>
        </met:unpackaged>
      </met:retrieveRequest>
    </met:retrieve>
  </soapenv:Body>
</soapenv:Envelope>`;
  try{
    const{status,text}=await soap(proxy,inst,tok,retrieveSOAP);
    log(`Retrieve status: ${status}`,'info');
    if(text.includes('<id>')){
      const asyncId=text.match(/<id>(.*?)<\/id>/)?.[1];
      log(`Retrieve async ID: ${asyncId}`,'trans');
      // Poll for retrieve result
      const checkSOAP=`<?xml version="1.0" encoding="UTF-8"?><soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:met="http://soap.sforce.com/2006/04/metadata"><soapenv:Header><met:SessionHeader><met:sessionId>${tok}</met:sessionId></met:SessionHeader></soapenv:Header><soapenv:Body><met:checkRetrieveStatus><met:asyncProcessId>${asyncId}</met:asyncProcessId><met:includeZip>true</met:includeZip></met:checkRetrieveStatus></soapenv:Body></soapenv:Envelope>`;
      for(let i=0;i<8;i++){
        await sleep(3000);
        const{status:s2,text:t2}=await soap(proxy,inst,tok,checkSOAP);
        log(`Poll ${i}: status=${s2}`,'info');
        if(t2.includes('<done>true</done>')){
          log('Retrieve complete!','ok');
          // Extract zip file content
          const zipBase64=t2.match(/<zipFile>(.*?)<\/zipFile>/s)?.[1]?.replace(/\s/g,'');
          if(zipBase64){
            log(`ZIP file retrieved (${zipBase64.length} chars base64)`,'ok');
            try{
              const zip=await JSZip.loadAsync(zipBase64,{base64:true});
              log('Files in ZIP:','info');
              Object.keys(zip.files).forEach(f=>log('  - '+f,'info'));
              // Read translation file
              const transFile=zip.files['unpackaged/translations/he.translation-meta.xml']||zip.files['translations/he.translation-meta.xml'];
              if(transFile){
                const content=await transFile.async('string');
                log('=== ACTUAL he.translation-meta.xml CONTENT ===','ok');
                log(content,'ok');
                log('=== END OF FILE ===','ok');
              }else{
                log('Translation file not found in ZIP. Files: '+Object.keys(zip.files).join(', '),'warn');
              }
            }catch(ze){log('ZIP parse error: '+ze.message,'err');}
          }else{
            log('No ZIP content in response','warn');
            log('Response: '+t2.substring(0,600),'info');
          }
          break;
        }
        if(t2.includes('<done>false</done>')){log('Still pending...','info');}
        else{log('Unexpected: '+t2.substring(0,300),'warn');break;}
      }
    }else{
      log('No async ID. Response: '+text.substring(0,400),'warn');
    }
  }catch(e){log('Retrieve error: '+e.message,'err');}
  await sleep(500);
  log('─────────────────────────────────────────','info');

  // STEP 2: Try ZIP deploy with the EXACT correct structure (after seeing what retrieve returns)
  log('STEP 2 — ZIP deploy with customObjects (standard approach)','trans');
  try{
    const transXML=`<?xml version="1.0" encoding="UTF-8"?>
<Translations xmlns="http://soap.sforce.com/2006/04/metadata">
    <customObjects>
        <name>${obj}</name>
        <customFields>
            <name>${dev}</name>
            <label>${heb}</label>
        </customFields>
    </customObjects>
</Translations>`;
    log('ZIP XML:\n'+transXML,'info');
    const pkgXML=`<?xml version="1.0" encoding="UTF-8"?>\n<Package xmlns="http://soap.sforce.com/2006/04/metadata">\n  <types>\n    <members>he</members>\n    <name>Translations</name>\n  </types>\n  <version>59.0</version>\n</Package>`;
    const zip=new JSZip();
    zip.file('translations/he.translation-meta.xml',transXML,{binary:false});
    zip.file('package.xml',pkgXML,{binary:false});
    const base64=await zip.generateAsync({type:'base64',compression:'DEFLATE'});
    log(`ZIP size: ${base64.length} chars`,'info');
    const deploySOAP=`<?xml version="1.0" encoding="UTF-8"?><soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:met="http://soap.sforce.com/2006/04/metadata"><soapenv:Header><met:SessionHeader><met:sessionId>${tok}</met:sessionId></met:SessionHeader></soapenv:Header><soapenv:Body><met:deploy><met:ZipFile>${base64}</met:ZipFile><met:DeployOptions><met:checkOnly>false</met:checkOnly><met:rollbackOnError>true</met:rollbackOnError><met:singlePackage>true</met:singlePackage><met:ignoreWarnings>true</met:ignoreWarnings></met:DeployOptions></met:deploy></soapenv:Body></soapenv:Envelope>`;
    const{status:ds,text:dt}=await soap(proxy,inst,tok,deploySOAP);
    log(`Deploy status: ${ds}`,'info');
    if(dt.includes('<id>')){
      const asyncId=dt.match(/<id>(.*?)<\/id>/)?.[1];
      log(`Deploy ID: ${asyncId}`,'trans');
      const statusSOAP=`<?xml version="1.0" encoding="UTF-8"?><soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:met="http://soap.sforce.com/2006/04/metadata"><soapenv:Header><met:SessionHeader><met:sessionId>${tok}</met:sessionId></met:SessionHeader></soapenv:Header><soapenv:Body><met:checkDeployStatus><met:asyncProcessId>${asyncId}</met:asyncProcessId><met:includeDetails>true</met:includeDetails></met:checkDeployStatus></soapenv:Body></soapenv:Envelope>`;
      for(let i=0;i<10;i++){
        await sleep(4000);
        const{text:st}=await soap(proxy,inst,tok,statusSOAP);
        const done=st.includes('<done>true</done>');
        const success=st.includes('<success>true</success>')&&!st.includes('<success>false</success>');
        const status2=st.match(/<state>(.*?)<\/state>/)?.[1]||st.match(/<status>(.*?)<\/status>/)?.[1]||'?';
        const problem=st.match(/<problem>(.*?)<\/problem>/)?.[1]||'';
        log(`Poll ${i}: ${status2}${problem?' | '+problem:''}`,'info');
        if(done){
          if(success)log('✓ ZIP DEPLOY SUCCESS! Hebrew label saved!','ok');
          else log('✕ ZIP failed. Full response:\n'+st.substring(0,1000),'err');
          break;
        }
      }
    }else log('No deploy ID: '+dt.substring(0,400),'err');
  }catch(e){log('ZIP error: '+e.message,'err');}

  log('─────────────────────────────────────────','info');
  log('Done! Paste all results in Claude','trans');
  btn.disabled=false;btn.textContent='▶ Run all tests';
}
</script>
</body>
</html>
