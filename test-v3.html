<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SF Translation Tester v3 — Namespace Fix</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'IBM Plex Mono',monospace;background:#0a0a0f;color:#e8e8f0;font-size:12px;padding:20px;}
h1{font-size:15px;color:#6c63ff;margin-bottom:12px;}
.panel{background:#12121a;border:1px solid #2a2a40;border-radius:8px;padding:14px;margin-bottom:12px;}
label{font-size:10px;color:#8888aa;text-transform:uppercase;letter-spacing:0.06em;display:block;margin-bottom:4px;margin-top:8px;}
input{background:#0a0a0f;border:1px solid #3a3a55;border-radius:6px;color:#e8e8f0;font-family:'IBM Plex Mono',monospace;font-size:11px;padding:6px 8px;width:100%;}
input:focus{outline:none;border-color:#6c63ff;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.btn{padding:8px 16px;border-radius:6px;font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;cursor:pointer;border:1px solid;margin-right:8px;margin-top:8px;}
.ba{background:#6c63ff;border-color:#6c63ff;color:#fff;}
.ba:hover{filter:brightness(1.15);}
.bg{background:transparent;border-color:#3a3a55;color:#8888aa;}
.bg:hover{border-color:#6c63ff;color:#e8e8f0;}
.btn:disabled{opacity:0.35;cursor:not-allowed;}
#log{background:#0a0a0f;border:1px solid #2a2a40;border-radius:6px;padding:12px;max-height:700px;overflow-y:auto;font-size:11px;line-height:1.9;margin-top:12px;white-space:pre-wrap;}
.ok{color:#00d4aa;display:block;}.err{color:#ff6b6b;display:block;}.warn{color:#f5c842;display:block;}.info{color:#8888aa;display:block;}.trans{color:#6c63ff;display:block;}
</style>
</head>
<body>
<h1>⚡ SF Translation Tester v3 — Testing namespace variations</h1>
<div class="panel">
  <div class="g2">
    <div><label>Proxy</label><input id="proxy" value="https://sf-proxy-ncj5.onrender.com"/></div>
    <div><label>Instance</label><input id="inst" value="https://orgfarm-f9bef0820c-dev-ed.develop.my.salesforce.com"/></div>
  </div>
  <label>Access Token (main app → Console F12 → S.token)</label>
  <input type="password" id="tok" placeholder="00DgK..."/>
  <div class="g2">
    <div><label>Object</label><input id="obj" value="Account"/></div>
    <div><label>Field (with __c)</label><input id="fld" value="sadsad1231231__c"/></div>
  </div>
  <label>Hebrew Label</label>
  <input id="heb" value="שדגשדגשדג" dir="rtl"/>
  <div>
    <button class="btn ba" id="btn" onclick="runAll()">▶ Run namespace tests</button>
    <button class="btn bg" onclick="document.getElementById('log').innerHTML=''">Clear</button>
  </div>
</div>
<div id="log">Click Run to start...</div>

<script>
function ts(){const n=new Date();return`${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;}
function log(msg,cls='info'){const b=document.getElementById('log');const s=document.createElement('span');s.className=cls;s.textContent=`${ts()} ${msg}`;b.appendChild(s);b.scrollTop=b.scrollHeight;}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
function vals(){return{proxy:document.getElementById('proxy').value.trim().replace(/\/$/,''),inst:document.getElementById('inst').value.trim().replace(/\/$/,''),tok:document.getElementById('tok').value.trim(),obj:document.getElementById('obj').value.trim(),fld:document.getElementById('fld').value.trim(),heb:document.getElementById('heb').value.trim()};}
async function soap(proxy,inst,tok,body){const r=await fetch(proxy+'/metadata-deploy',{method:'POST',headers:{'Content-Type':'text/xml','x-sf-instance':inst,'x-sf-token':tok},body});return{status:r.status,text:await r.text()};}

async function runAll(){
  document.getElementById('log').innerHTML='';
  const btn=document.getElementById('btn');btn.disabled=true;btn.textContent='Running...';
  const{proxy,inst,tok,obj,fld,heb}=vals();
  const dev=fld.replace(/__c$/i,'');
  if(!tok){log('Paste your token first','err');btn.disabled=false;btn.textContent='▶ Run namespace tests';return;}
  log(`Object: ${obj} | Dev name: ${dev} | Hebrew: ${heb}`,'info');
  log('─────────────────────────────────────────','info');

  // Variant A — no met: prefix on inner elements
  log('VARIANT A — createMetadata WITHOUT met: prefix on inner elements','trans');
  const varA=`<?xml version="1.0" encoding="UTF-8"?>
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:met="http://soap.sforce.com/2006/04/metadata" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <soapenv:Header>
    <met:SessionHeader><met:sessionId>${tok}</met:sessionId></met:SessionHeader>
  </soapenv:Header>
  <soapenv:Body>
    <met:createMetadata>
      <met:metadata xsi:type="met:Translations">
        <met:fullName>he</met:fullName>
        <customObjects>
          <name>${obj}</name>
          <customFields>
            <name>${dev}</name>
            <label>${heb}</label>
          </customFields>
        </customObjects>
      </met:metadata>
    </met:createMetadata>
  </soapenv:Body>
</soapenv:Envelope>`;
  log('SOAP being sent:\n'+varA,'info');
  try{
    const{status,text}=await soap(proxy,inst,tok,varA);
    log(`Status: ${status}`,'info');
    log(`Response: ${text.substring(0,600)}`,'info');
    if(text.includes('<success>true</success>'))log('✓ VARIANT A SUCCESS!','ok');
    else if(text.includes('faultstring'))log('✕ Fault: '+(text.match(/<faultstring>(.*?)<\/faultstring>/)?.[1]||'?'),'err');
  }catch(e){log('✕ '+e.message,'err');}
  await sleep(800);
  log('─────────────────────────────────────────','info');

  // Variant B — empty translation first, then update
  log('VARIANT B — createMetadata with EMPTY he record first, then updateMetadata','trans');
  const varBcreate=`<?xml version="1.0" encoding="UTF-8"?>
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:met="http://soap.sforce.com/2006/04/metadata" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <soapenv:Header>
    <met:SessionHeader><met:sessionId>${tok}</met:sessionId></met:SessionHeader>
  </soapenv:Header>
  <soapenv:Body>
    <met:createMetadata>
      <met:metadata xsi:type="met:Translations">
        <met:fullName>he</met:fullName>
      </met:metadata>
    </met:createMetadata>
  </soapenv:Body>
</soapenv:Envelope>`;
  log('Step B1: Create empty he record...','info');
  try{
    const{status,text}=await soap(proxy,inst,tok,varBcreate);
    log(`Create empty status: ${status}`,'info');
    log(`Create empty response: ${text.substring(0,400)}`,'info');
    if(text.includes('<success>true</success>'))log('✓ Empty record created','ok');
    else if(text.includes('faultstring'))log('Fault (may already exist): '+(text.match(/<faultstring>(.*?)<\/faultstring>/)?.[1]||'?'),'warn');
  }catch(e){log('✕ '+e.message,'err');}
  await sleep(800);

  const varBupdate=`<?xml version="1.0" encoding="UTF-8"?>
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:met="http://soap.sforce.com/2006/04/metadata" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <soapenv:Header>
    <met:SessionHeader><met:sessionId>${tok}</met:sessionId></met:SessionHeader>
  </soapenv:Header>
  <soapenv:Body>
    <met:updateMetadata>
      <met:metadata xsi:type="met:Translations">
        <met:fullName>he</met:fullName>
        <customObjects>
          <name>${obj}</name>
          <customFields>
            <name>${dev}</name>
            <label>${heb}</label>
          </customFields>
        </customObjects>
      </met:metadata>
    </met:updateMetadata>
  </soapenv:Body>
</soapenv:Envelope>`;
  log('Step B2: updateMetadata with field translation (no met: prefix)...','info');
  try{
    const{status,text}=await soap(proxy,inst,tok,varBupdate);
    log(`Update status: ${status}`,'info');
    log(`Update response: ${text.substring(0,600)}`,'info');
    if(text.includes('<success>true</success>'))log('✓ VARIANT B SUCCESS!','ok');
    else if(text.includes('faultstring'))log('✕ Fault: '+(text.match(/<faultstring>(.*?)<\/faultstring>/)?.[1]||'?'),'err');
  }catch(e){log('✕ '+e.message,'err');}
  await sleep(800);
  log('─────────────────────────────────────────','info');

  // Variant C — using default namespace instead of met: prefix
  log('VARIANT C — createMetadata with default namespace (no prefix at all)','trans');
  const varC=`<?xml version="1.0" encoding="UTF-8"?>
<soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <soapenv:Header>
    <SessionHeader xmlns="http://soap.sforce.com/2006/04/metadata">
      <sessionId>${tok}</sessionId>
    </SessionHeader>
  </soapenv:Header>
  <soapenv:Body>
    <createMetadata xmlns="http://soap.sforce.com/2006/04/metadata">
      <metadata xsi:type="Translations">
        <fullName>he</fullName>
        <customObjects>
          <name>${obj}</name>
          <customFields>
            <name>${dev}</name>
            <label>${heb}</label>
          </customFields>
        </customObjects>
      </metadata>
    </createMetadata>
  </soapenv:Body>
</soapenv:Envelope>`;
  try{
    const{status,text}=await soap(proxy,inst,tok,varC);
    log(`Status: ${status}`,'info');
    log(`Response: ${text.substring(0,600)}`,'info');
    if(text.includes('<success>true</success>'))log('✓ VARIANT C SUCCESS!','ok');
    else if(text.includes('faultstring'))log('✕ Fault: '+(text.match(/<faultstring>(.*?)<\/faultstring>/)?.[1]||'?'),'err');
  }catch(e){log('✕ '+e.message,'err');}
  await sleep(800);
  log('─────────────────────────────────────────','info');

  // Verify
  log('VERIFY — readMetadata to check if anything worked','trans');
  const readSOAP=`<?xml version="1.0" encoding="UTF-8"?><soapenv:Envelope xmlns:soapenv="http://schemas.xmlsoap.org/soap/envelope/" xmlns:met="http://soap.sforce.com/2006/04/metadata"><soapenv:Header><met:SessionHeader><met:sessionId>${tok}</met:sessionId></met:SessionHeader></soapenv:Header><soapenv:Body><met:readMetadata><met:type>Translations</met:type><met:fullNames>he</met:fullNames></met:readMetadata></soapenv:Body></soapenv:Envelope>`;
  try{
    const{status,text}=await soap(proxy,inst,tok,readSOAP);
    log(`Status: ${status}`,'info');
    log(`Response: ${text.substring(0,800)}`,'info');
    if(text.includes(dev)&&text.includes(heb))log('✓ Hebrew label confirmed in Salesforce!','ok');
    else if(text.includes('xsi:nil="true"'))log('✕ Translation record still empty','err');
    else log('Check response above','warn');
  }catch(e){log('✕ '+e.message,'err');}

  log('─────────────────────────────────────────','info');
  log('Done — paste all results in Claude','trans');
  btn.disabled=false;btn.textContent='▶ Run namespace tests';
}
</script>
</body>
</html>
